{% extends "base.html" %}

{% block title %}Вход - Mentoria Hub{% endblock %}

{% block extra_css %}
<style>
    /* Стили полей ввода в стиле Stepik */
    .form-input { 
        width: 100%; 
        padding: 0.6rem 0.8rem; 
        border: 1px solid #ced4da; 
        border-radius: 0.375rem; 
        font-size: 0.875rem;
        transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
    }
    .form-input:focus { 
        outline: none; 
        border-color: #4caf50; 
        box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.15); 
    }
</style>
{% endblock %}

{% block content %}
<div class="max-w-[400px] mx-auto my-10">
    <div class="bg-white rounded-xl border border-gray-200 p-8">
        <div class="text-center mb-6">
            <div class="w-12 h-12 rounded-full bg-gray-50 text-gray-400 inline-flex items-center justify-center mb-3 border border-gray-100">
                <i class="fas fa-sign-in-alt text-lg"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Вход</h1>
            <p class="text-xs text-gray-500 mt-1">Введите данные для входа в Mentoria Hub</p>
        </div>

        {% if error %}
            <div class="bg-rose-50 border border-rose-200 text-rose-700 px-4 py-2.5 rounded-md text-xs mb-4">
                {{ error }}
            </div>
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}

            <div>
                <label for="username" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">
                    Имя пользователя
                </label>
                <input type="text" name="username" id="username" class="form-input" placeholder="Ваше имя пользователя" required>
            </div>

            <div>
                <label for="password" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">
                    Пароль
                </label>
                <input type="password" name="password" id="password" class="form-input" placeholder="Ваш пароль" required>
            </div>

            <button type="submit" class="btn-stepik text-white w-full py-2.5 rounded-md text-sm font-medium transition shadow-sm mt-6">
                Войти
            </button>
        </form>

        <div class="text-center mt-6 pt-4 border-t border-gray-100">
            <p class="text-xs text-gray-500">
                Нет аккаунта?
                <a href="{% url 'register' %}" class="text-[#4caf50] font-bold hover:text-[#45a049] transition-colors ml-1">
                    Зарегистрироваться
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

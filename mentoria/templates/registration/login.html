{% extends "base.html" %}

{% block title %}Вход - Mentoria Hub{% endblock %}

{% block extra_css %}
<style>
    .form-input { width:100%; padding:0.7rem; border:1px solid #e6e9ef; border-radius:0.5rem; }
    .form-input:focus { outline:none; box-shadow:0 0 0 4px rgba(107,93,223,0.07); border-color:#6b5ddf; }
    .small-badge { width:56px; height:56px; border-radius:0.5rem; display:inline-flex; align-items:center; justify-content:center; background:#eef2ff; color:#6b5ddf; }
</style>
{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-xl shadow p-8">
        <div class="text-center mb-6">
            <div class="small-badge mx-auto mb-3">
                <i class="fas fa-sign-in-alt"></i>
            </div>
            <h1 class="text-2xl font-semibold text-gray-900">Вход</h1>
            <p class="text-gray-600 mt-1">Введите данные для входа в Mentoria Hub</p>
        </div>

        {% if error %}
            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
                {{ error }}
            </div>
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}

            <!-- Username -->
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
                    Имя пользователя
                </label>
                <input type="text" name="username" id="username" class="form-input" placeholder="Ваше имя пользователя" required>
            </div>

            <!-- Password -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                    Пароль
                </label>
                <input type="password" name="password" id="password" class="form-input" placeholder="Ваш пароль" required>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-gradient text-white w-full py-3 rounded-lg font-semibold transition mt-6">
                <i class="fas fa-arrow-right mr-2"></i>Войти
            </button>
        </form>

        <!-- Register Link -->
        <div class="text-center mt-6">
            <p class="text-gray-600">
                Нет аккаунта?
                <a href="{% url 'register' %}" class="text-purple-600 font-semibold hover:text-purple-700">
                    Зарегистрироваться
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
